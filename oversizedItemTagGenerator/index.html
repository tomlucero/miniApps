<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Oversized/Secure Item Tag Generator | CSU Bookstore</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <script src="https://kit.fontawesome.com/b65fbcdd34.js" crossorigin="anonymous"></script>
  <link rel="stylesheet" href="../shared-theme.css">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="screen-only">
    <header class="suite-hero">
      <div class="suite-hero-image" role="img" aria-label="Colorado State University Lory Student Center"></div>
      <div class="suite-hero-inner">
        <div>
          <a class="suite-back" href="../index.html">&larr; Return to Toolbox</a>
          <p class="suite-eyebrow">Fulfillment helper</p>
          <h1>Oversized/Secure Item Tag Generator</h1>
          <p class="suite-lead">Create a pick-list reminder and matching tag for oversized or securely stored items.</p>
        </div>
        <img class="suite-logo" src="../productListingHTMLBuilder/images/bookstoreLogo.png" alt="CSU Bookstore logo">
      </div>
    </header>

    <main class="tool-band">
      <div class="container">
        <div class="row g-4 align-items-start">
          <div class="col-lg-5">
            <section class="card form-panel" aria-labelledby="detailsHeading">
              <div class="panel-title">
                <div>
                  <p class="suite-eyebrow">Tag setup</p>
                  <h2 id="detailsHeading">Order details</h2>
                </div>
                <button class="btn btn-outline-secondary" id="resetButton" type="button">Reset</button>
              </div>
              <form id="tagForm" novalidate>
                <div class="mb-3">
                  <label class="form-label" for="itemType">Item Type</label>
                  <select class="form-select" id="itemType" required>
                    <option value="Oversized Item" selected>Oversized Item</option>
                    <option value="Secure Item">Secure Item</option>
                  </select>
                </div>
                <div class="mb-3">
                  <label class="form-label" for="orderNumber">Order Number</label>
                  <input class="form-control" id="orderNumber" type="text" inputmode="numeric" autocomplete="off" required>
                </div>
                <div class="mb-3">
                  <label class="form-label" for="customerLastName">Customer Last Name</label>
                  <input class="form-control" id="customerLastName" type="text" autocomplete="family-name" required>
                </div>
                <div class="mb-3">
                  <label class="form-label" for="itemDescription">Item Description</label>
                  <textarea class="form-control" id="itemDescription" rows="3" required></textarea>
                </div>
                <div class="mb-3">
                  <label class="form-label" for="locationPreset">Item Location</label>
                  <select class="form-select" id="locationPreset" required>
                    <option value="Oversized Item Rack" selected>Oversized Item Rack</option>
                    <option value="RAMtech Lock-up">RAMtech Lock-up</option>
                    <option value="Gift Card Lock Box">Gift Card Lock Box</option>
                    <option value="other">Other</option>
                  </select>
                </div>
                <div class="mb-3 d-none" id="customLocationField">
                  <label class="form-label" for="customLocation">Custom Location</label>
                  <input class="form-control" id="customLocation" type="text" placeholder="Enter the item location">
                </div>
                <div class="mb-3">
                  <label class="form-label" for="skuUpc">SKU / UPC <span class="optional-label">Optional</span></label>
                  <input class="form-control" id="skuUpc" type="text" autocomplete="off">
                </div>
                <div>
                  <label class="form-label" for="optionalNotes">Optional Notes</label>
                  <textarea class="form-control" id="optionalNotes" rows="3" placeholder="Add handling instructions or other helpful details"></textarea>
                </div>
                <div class="form-status mt-4" id="formStatus" role="status" aria-live="polite"></div>
                <div class="action-row d-flex gap-2 mt-4">
                  <button class="btn btn-primary" id="printButton" type="submit"><i class="fa-solid fa-print" aria-hidden="true"></i> Print Tag Sheet</button>
                  <button class="btn btn-outline-secondary" id="clearButton" type="button"><i class="fa-solid fa-rotate-left" aria-hidden="true"></i> Reset</button>
                </div>
              </form>
            </section>
          </div>

          <div class="col-lg-7">
            <section class="card preview-panel" aria-labelledby="previewHeading">
              <div class="preview-panel-head d-flex justify-content-between align-items-center gap-3">
                <div>
                  <p class="suite-eyebrow">Live preview</p>
                  <h2 id="previewHeading">Letter-size tag sheet</h2>
                </div>
                <span class="preview-badge">8.5 × 11 portrait</span>
              </div>
              <div class="preview-stage">
                <div id="screenPreview"></div>
              </div>
            </section>
          </div>
        </div>
      </div>
    </main>
  </div>

  <div class="print-area" id="printArea" aria-hidden="true"></div>
  <script src="script.js"></script>
</body>
</html>
