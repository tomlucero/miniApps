<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="720" viewBox="0 0 1200 720" role="img" aria-labelledby="title desc">
  <title id="title">Printer loading photo placeholder</title>
  <desc id="desc">A simple illustration showing a label sheet moving into a laser printer tray.</desc>
  <rect width="1200" height="720" fill="#f1f5f9"/>
  <rect x="330" y="210" width="540" height="300" rx="28" fill="#ffffff" stroke="#94a3b8" stroke-width="8"/>
  <rect x="410" y="155" width="380" height="180" rx="12" fill="#e7f2f1" stroke="#126a64" stroke-width="7"/>
  <g fill="none" stroke="#126a64" stroke-width="4">
    <rect x="435" y="180" width="100" height="45" rx="5"/><rect x="545" y="180" width="100" height="45" rx="5"/><rect x="655" y="180" width="100" height="45" rx="5"/>
    <rect x="435" y="235" width="100" height="45" rx="5"/><rect x="545" y="235" width="100" height="45" rx="5"/><rect x="655" y="235" width="100" height="45" rx="5"/>
  </g>
  <path d="M600 115v105" stroke="#c5912c" stroke-width="16" stroke-linecap="round"/>
  <path d="M560 175l40 45 40-45" fill="none" stroke="#c5912c" stroke-width="16" stroke-linecap="round" stroke-linejoin="round"/>
  <rect x="395" y="380" width="410" height="95" rx="12" fill="#d9e2ec"/>
  <circle cx="790" cy="280" r="18" fill="#126a64"/>
  <text x="600" y="595" fill="#1f2933" font-family="Arial, sans-serif" font-size="40" font-weight="700" text-anchor="middle">Replace with printer-loading photo</text>
  <text x="600" y="645" fill="#64748b" font-family="Arial, sans-serif" font-size="26" text-anchor="middle">Show tray, printable side, and feed direction</text>
</svg>
