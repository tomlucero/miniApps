<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>CSU Bookstore Carousel Builder</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="bk-carousel.css">
  <link rel="stylesheet" href="style.css">
  <link rel="stylesheet" href="../shared-theme.css?v=20260621-1">
</head>
<body>
  <div class="app-shell">
    <header class="suite-hero">
      <div class="suite-hero-image" role="img" aria-label="Colorado State University Lory Student Center"></div>
      <div class="suite-hero-inner">
        <div>
          <a class="suite-back" href="../index.html">&larr; Return to Toolbox</a>
          <p class="suite-eyebrow">Site content helper</p>
          <h1>Carousel Builder</h1>
          <p class="suite-lead">Paste an existing banner carousel, edit the slides in plain fields, preview the result, and copy fresh Bootstrap carousel code.</p>
        </div>
        <img class="suite-logo" src="../productListingHTMLBuilder/images/bookstoreLogo.png" alt="CSU Bookstore logo">
      </div>
    </header>

    <main class="layout">
      <div class="top-actions suite-workspace-actions">
        <button class="btn primary" id="copyTop" type="button" title="Copy generated carousel code">Copy Code</button>
        <button class="btn" id="addTop" type="button" title="Add a new carousel slide">Add Slide</button>
      </div>
      <section class="panel">
        <div class="panel-heading">
          <h2>Slides</h2>
          <div class="row-actions">
            <button class="btn small" id="loadSample" type="button">Load Current Carousel</button>
            <button class="btn small dark" id="importBtn" type="button">Import Pasted Code</button>
          </div>
        </div>
        <div class="panel-body import-tools">
          <label for="sourceCode">Paste carousel code here <span>Existing `bk-carousel` markup will be converted into editable slides.</span></label>
          <textarea id="sourceCode" spellcheck="false"></textarea>
          <div class="settings-grid settings-grid--two">
            <label for="carouselId">Carousel ID
              <input id="carouselId" value="bkHomeHeroOverlayCarousel">
            </label>
            <label for="commentDisabled">Disabled slides
              <select id="commentDisabled">
                <option value="comments">Keep as comments</option>
                <option value="omit">Leave out</option>
              </select>
            </label>
          </div>
          <div id="slideList" class="slide-list"></div>
        </div>
      </section>

      <section class="panel">
        <div class="panel-heading">
          <h2>Preview and Code</h2>
          <div class="row-actions">
            <button class="btn small" id="prevSlide" type="button" title="Previous preview slide">Prev</button>
            <button class="btn small" id="nextSlide" type="button" title="Next preview slide">Next</button>
          </div>
        </div>
        <div class="panel-body output-grid">
          <div class="preview-wrap" aria-live="polite">
            <div class="preview-stage" id="previewStage"></div>
            <div class="preview-nav">
              <button class="btn icon" id="previewPrev" type="button" title="Previous preview slide">&#8592;</button>
              <div class="dots" id="previewDots"></div>
              <button class="btn icon" id="previewNext" type="button" title="Next preview slide">&#8594;</button>
            </div>
          </div>
          <div class="row-actions">
            <button class="btn primary" id="copyCode" type="button">Copy Generated Code</button>
            <button class="btn" id="selectCode" type="button">Select Code</button>
            <span class="status" id="status"></span>
          </div>
          <label for="outputCode">Generated carousel code <span>Copy this into your site where the carousel HTML goes.</span></label>
          <textarea id="outputCode" spellcheck="false"></textarea>
        </div>
      </section>
    </main>
  </div>

  <script>
    const sampleCode = `<!--
  CSU Bookstore homepage carousel
  CSS dependency: upload/link bk-carousel.css before this HTML block.
  JS dependency: Bootstrap 5 carousel JS, already supplied by MBS Insite.

  Image guidance:
  - Desktop image: wide hero crop, example 2400 x 900 px.
  - Mobile image: separate mobile crop, example 1100 x 900 px or another approved mobile composition.
  - Every slide should include both the mobile <source> and the desktop/default <img>.

  Content guidance:
  - Eyebrow is optional. Remove the <p class="bk-carousel__eyebrow">...</p> line when it does not add useful context.
  - Use one <h1> on the homepage. For additional slides, change h1 to h2 if heading structure becomes a concern.
  - Keep button text short and action-focused.
  - To add a fourth slide, uncomment both the fourth indicator button and the fourth carousel-item block.
-->
<section class="bk-carousel-block">
<div id="bkHomeHeroOverlayCarousel" class="bk-carousel bk-carousel--full carousel slide" data-bs-ride="false" aria-label="Featured Bookstore campaigns">
<div class="carousel-indicators">
<button type="button" data-bs-target="#bkHomeHeroOverlayCarousel" data-bs-slide-to="0" class="active" aria-current="true" aria-label="Slide 1"></button>
<button type="button" data-bs-target="#bkHomeHeroOverlayCarousel" data-bs-slide-to="1" aria-label="Slide 2"></button>
<button type="button" data-bs-target="#bkHomeHeroOverlayCarousel" data-bs-slide-to="2" aria-label="Slide 3"></button>
<!-- Fourth slide indicator: uncomment when the fourth carousel-item is active.
      <button type="button" data-bs-target="#bkHomeHeroOverlayCarousel" data-bs-slide-to="3" aria-label="Slide 4"></button>
      -->
</div>
<div class="carousel-inner">
<!-- Slide 1 -->
<div class="carousel-item active">
<div class="bk-carousel__media" aria-hidden="true">
<picture>
<source media="(max-width: 767px)" srcset="/SiteImages/109-SchoolImages/109-X26-SummertimeRam-1100x900.jpg">
<img src="/SiteImages/109-SchoolImages/109-X26-SummertimeRam-2400x900-NEW.jpg" alt="A stuffed ram with sunglasses looks is on a background with Poudre Canyon and the CSU Lagoon.">
</picture>
</div>
<div class="container bk-carousel__content">
<div class="bk-carousel__panel">
<p class="bk-carousel__eyebrow">Welcome to CSU</p>
<h1 class="bk-carousel__title">Find Your <span class="bk-carousel__highlight">New Start</span> Energy</h1>
<p class="bk-carousel__text">The CSU Bookstore has CSU Rams Gear, course materials, gifts, supplies, and essentials for campus life.</p>
<div class="bk-carousel__actions">
<a class="bk-carousel__btn bk-carousel__btn--light" href="/shop/apparel">Shop Rams Apparel <span class="bk-carousel__arrow" aria-hidden="true"></span></a>
<a class="bk-carousel__btn bk-carousel__btn--orange" href="/SelectTermDept">Find Course Materials <span class="bk-carousel__arrow" aria-hidden="true"></span></a>
</div>
</div>
</div>
</div>
<!-- Slide 2 -->
<div class="carousel-item">
<div class="bk-carousel__media" aria-hidden="true">
<picture>
<source media="(max-width: 767px)" srcset="/SiteImages/109-SchoolImages/109-S26-TextbookPreorder-1100x900.jpg">
<img src="/SiteImages/109-SchoolImages/109-S26-TextbookPreorder-2400x900-REDO.jpg" alt="Cam the Ram stuffed animal sits on a stack of books">
</picture>
</div>
<div class="container bk-carousel__content">
<div class="bk-carousel__panel">
<p class="bk-carousel__eyebrow">Course Materials</p>
<h2 class="bk-carousel__title">Preorder Your Course Materials</h2>
<p class="bk-carousel__text">Skip the textbook hunt. We'll get your books ready.</p>
<div class="bk-carousel__actions">
<a class="bk-carousel__btn bk-carousel__btn--orange" href="/preorder">Preorder Today <span class="bk-carousel__arrow" aria-hidden="true"></span></a>
</div>
</div>
</div>
</div>
<!-- Slide 3 -->
<div class="carousel-item">
<div class="bk-carousel__media" aria-hidden="true">
<picture>
<source media="(max-width: 767px)" srcset="/SiteImages/109-SchoolImages/109-S26-MacbookNeo-1100x900.jpg">
<img src="/SiteImages/109-SchoolImages/109-S26-Macbook-2400x900.jpg" alt="four macbook neos in different colors are illustrated.">
</picture>
</div>
<div class="container bk-carousel__content">
<div class="bk-carousel__panel">
<p class="bk-carousel__eyebrow">RAMTech</p>
<h2 class="bk-carousel__title">Love at First Mac</h2>
<p class="bk-carousel__text">MacBook Neo now available at RAMTech</p>
<div class="bk-carousel__actions">
<a class="bk-carousel__btn bk-carousel__btn--light" href="/shop/electronics/apple/Apple-MacBook-Neo-13-inch-A18-Pro">Shop MacBook Neo <span class="bk-carousel__arrow" aria-hidden="true"></span></a>
</div>
</div>
</div>
</div>
</div>
<button class="carousel-control-prev" type="button" data-bs-target="#bkHomeHeroOverlayCarousel" data-bs-slide="prev">
<span class="carousel-control-prev-icon" aria-hidden="true"></span>
<span class="visually-hidden">Previous campaign</span>
</button>
<button class="carousel-control-next" type="button" data-bs-target="#bkHomeHeroOverlayCarousel" data-bs-slide="next">
<span class="carousel-control-next-icon" aria-hidden="true"></span>
<span class="visually-hidden">Next campaign</span>
</button>
</div>
</section>`;

    const previewImageHost = "https://bookstore.colostate.edu";
    const buttonStyles = ["light", "orange"];

    const state = {
      slides: [],
      previewIndex: 0
    };

    const els = {
      sourceCode: document.querySelector("#sourceCode"),
      slideList: document.querySelector("#slideList"),
      carouselId: document.querySelector("#carouselId"),
      commentDisabled: document.querySelector("#commentDisabled"),
      previewStage: document.querySelector("#previewStage"),
      previewDots: document.querySelector("#previewDots"),
      outputCode: document.querySelector("#outputCode"),
      status: document.querySelector("#status")
    };

    function cleanText(value) {
      return String(value || "").replace(/\s+/g, " ").trim();
    }

    function escapeAttr(value) {
      return String(value || "")
        .replace(/&/g, "&amp;")
        .replace(/"/g, "&quot;")
        .replace(/</g, "&lt;")
        .replace(/>/g, "&gt;");
    }

    function escapeHtml(value) {
      return String(value || "")
        .replace(/&/g, "&amp;")
        .replace(/</g, "&lt;")
        .replace(/>/g, "&gt;");
    }

    function makeSlide(overrides = {}) {
      return {
        enabled: true,
        desktopImage: "",
        mobileImage: "",
        alt: "",
        eyebrow: "",
        headline: "",
        highlight: "",
        description: "",
        primaryLink: "",
        primaryText: "",
        primaryStyle: "light",
        secondaryLink: "",
        secondaryText: "",
        secondaryStyle: "orange",
        ...overrides
      };
    }

    function previewImageUrl(path) {
      const value = String(path || "").trim();
      if (!value) return "";
      if (/^(https?:)?\/\//i.test(value) || value.startsWith("data:")) return value;
      if (value.startsWith("/")) return `${previewImageHost}${value}`;
      return `${previewImageHost}/${value}`;
    }

    function desktopOrFallback(slide) {
      return cleanText(slide.desktopImage) || cleanText(slide.mobileImage);
    }

    function mobileOrFallback(slide) {
      return cleanText(slide.mobileImage) || cleanText(slide.desktopImage);
    }

    function parseSlidesFromCode(code) {
      const parser = new DOMParser();
      const doc = parser.parseFromString(`<div id="parse-root">${code}</div>`, "text/html");
      const carousel = doc.querySelector(".bk-carousel");
      const foundId = carousel && carousel.id ? carousel.id : "";
      if (foundId) els.carouselId.value = foundId;

      const activeSlides = Array.from(doc.querySelectorAll(".carousel-item")).map(item => slideFromElement(item, true));
      const commentSlides = [];
      const commentMatches = String(code).match(/<!--[\s\S]*?-->/g) || [];
      commentMatches.forEach(comment => {
        if (!comment.includes("carousel-item")) return;
        const uncommented = comment.replace(/^<!--/, "").replace(/-->$/, "");
        const commentDoc = parser.parseFromString(`<div>${uncommented}</div>`, "text/html");
        const item = commentDoc.querySelector(".carousel-item");
        if (item) commentSlides.push(slideFromElement(item, false));
      });

      const slides = [...activeSlides, ...commentSlides];
      state.slides = slides.length ? slides : [makeSlide()];
      state.previewIndex = 0;
      render();
      setStatus(`Imported ${state.slides.length} slide${state.slides.length === 1 ? "" : "s"}.`);
    }

    function slideFromElement(item, enabled) {
      const picture = item.querySelector("picture");
      const mobileSource = picture ? picture.querySelector("source") : null;
      const desktopImage = picture ? picture.querySelector("img") : item.querySelector("img");
      const eyebrow = item.querySelector(".bk-carousel__eyebrow");
      const title = item.querySelector(".bk-carousel__title");
      const highlight = title ? title.querySelector(".bk-carousel__highlight") : null;
      const description = item.querySelector(".bk-carousel__text");
      const buttons = Array.from(item.querySelectorAll(".bk-carousel__btn"));
      const primary = buttons[0] || null;
      const secondary = buttons[1] || null;

      return makeSlide({
        enabled,
        desktopImage: desktopImage ? desktopImage.getAttribute("src") || "" : "",
        mobileImage: mobileSource ? mobileSource.getAttribute("srcset") || "" : "",
        alt: desktopImage ? desktopImage.getAttribute("alt") || "" : "",
        eyebrow: eyebrow ? cleanText(eyebrow.textContent) : "",
        headline: title ? cleanText(title.textContent) : "",
        highlight: highlight ? cleanText(highlight.textContent) : "",
        description: description ? cleanText(description.textContent) : "",
        primaryLink: primary ? primary.getAttribute("href") || "" : "",
        primaryText: primary ? cleanText(primary.textContent) : "",
        primaryStyle: detectButtonStyle(primary),
        secondaryLink: secondary ? secondary.getAttribute("href") || "" : "",
        secondaryText: secondary ? cleanText(secondary.textContent) : "",
        secondaryStyle: detectButtonStyle(secondary, "orange")
      });
    }

    function detectButtonStyle(button, fallback = "light") {
      if (!button) return fallback;
      if (button.classList.contains("bk-carousel__btn--orange")) return "orange";
      return "light";
    }

    function render() {
      normalizePreviewIndex();
      renderSlideForms();
      refreshPreviewAndCode();
    }

    function refreshPreviewAndCode() {
      normalizePreviewIndex();
      renderPreview();
      els.outputCode.value = generateCode();
    }

    function normalizePreviewIndex() {
      const enabled = getEnabledSlides();
      if (!enabled.length) {
        state.previewIndex = 0;
        return;
      }
      state.previewIndex = Math.min(Math.max(state.previewIndex, 0), enabled.length - 1);
    }

    function getEnabledSlides() {
      return state.slides.filter(slide => slide.enabled);
    }

    function buttonStyleOptions(selected) {
      return buttonStyles.map(style => `<option value="${style}"${style === selected ? " selected" : ""}>${style === "light" ? "Light" : "Orange"}</option>`).join("");
    }

    function renderSlideForms() {
      els.slideList.innerHTML = "";
      state.slides.forEach((slide, index) => {
        const card = document.createElement("article");
        card.className = "slide-card";
        card.innerHTML = `
          <div class="slide-summary">
            <img class="slide-thumb" src="${escapeAttr(previewImageUrl(slide.desktopImage))}" alt="">
            <div>
              <div class="slide-title">Slide ${index + 1}: ${escapeHtml(cleanText(slide.headline) || "Untitled")}</div>
              <div class="slide-meta">${slide.enabled ? "Included" : "Disabled"} · ${slide.primaryLink || slide.secondaryLink || "No link yet"}</div>
            </div>
            <div class="slide-actions">
              <button class="btn icon" type="button" data-action="up" title="Move slide up">&#8593;</button>
              <button class="btn icon" type="button" data-action="down" title="Move slide down">&#8595;</button>
              <button class="btn icon" type="button" data-action="duplicate" title="Duplicate slide">+</button>
              <button class="btn icon danger" type="button" data-action="remove" title="Remove slide">&times;</button>
            </div>
          </div>
          <div class="slide-fields">
            <label>Desktop image
              <input data-field="desktopImage" value="${escapeAttr(slide.desktopImage)}" placeholder="/SiteImages/109-SchoolImages/example-2400x900.jpg">
            </label>
            <label>Mobile image
              <input data-field="mobileImage" value="${escapeAttr(slide.mobileImage)}" placeholder="/SiteImages/109-SchoolImages/example-1100x900.jpg">
            </label>
            <label class="wide">Alt text
              <input data-field="alt" value="${escapeAttr(slide.alt)}" placeholder="Describe the image for accessibility">
            </label>
            <label>Eyebrow
              <input data-field="eyebrow" value="${escapeAttr(slide.eyebrow)}" placeholder="Optional category label">
            </label>
            <label>Highlight word
              <input data-field="highlight" value="${escapeAttr(slide.highlight)}" placeholder="Optional text to accent in headline">
            </label>
            <label class="wide">Headline
              <input data-field="headline" value="${escapeAttr(slide.headline)}" placeholder="Carousel headline">
            </label>
            <label class="wide">Additional info
              <input data-field="description" value="${escapeAttr(slide.description)}" placeholder="Short supporting message">
            </label>
            <label>Button text
              <input data-field="primaryText" value="${escapeAttr(slide.primaryText)}" placeholder="Shop Now">
            </label>
            <label>Button link
              <input data-field="primaryLink" value="${escapeAttr(slide.primaryLink)}" placeholder="/shop/example">
            </label>
            <label>Button style
              <select data-field="primaryStyle">${buttonStyleOptions(slide.primaryStyle)}</select>
            </label>
            <label>Secondary button text
              <input data-field="secondaryText" value="${escapeAttr(slide.secondaryText)}" placeholder="Optional second button">
            </label>
            <label>Secondary button link
              <input data-field="secondaryLink" value="${escapeAttr(slide.secondaryLink)}" placeholder="/shop/example-two">
            </label>
            <label>Secondary style
              <select data-field="secondaryStyle">${buttonStyleOptions(slide.secondaryStyle)}</select>
            </label>
            <div class="inline-fields wide">
              <label class="check-row">
                <input data-field="enabled" type="checkbox" ${slide.enabled ? "checked" : ""}>
                Include slide
              </label>
            </div>
          </div>
        `;

        card.querySelectorAll("[data-field]").forEach(field => {
          const eventName = field.tagName === "SELECT" ? "change" : "input";
          field.addEventListener(eventName, () => {
            const key = field.dataset.field;
            slide[key] = field.type === "checkbox" ? field.checked : field.value;
            if (key === "desktopImage") {
              const thumb = card.querySelector(".slide-thumb");
              thumb.src = previewImageUrl(field.value);
            }
            refreshPreviewAndCode();
          });
        });

        card.querySelectorAll("[data-action]").forEach(button => {
          button.addEventListener("click", () => runSlideAction(button.dataset.action, index));
        });

        els.slideList.appendChild(card);
      });
    }

    function runSlideAction(action, index) {
      if (action === "up" && index > 0) {
        [state.slides[index - 1], state.slides[index]] = [state.slides[index], state.slides[index - 1]];
      }
      if (action === "down" && index < state.slides.length - 1) {
        [state.slides[index + 1], state.slides[index]] = [state.slides[index], state.slides[index + 1]];
      }
      if (action === "duplicate") {
        state.slides.splice(index + 1, 0, makeSlide({ ...state.slides[index] }));
      }
      if (action === "remove") {
        state.slides.splice(index, 1);
        if (!state.slides.length) state.slides.push(makeSlide());
      }
      render();
    }

    function renderPreview() {
      const slides = getEnabledSlides();
      const slide = slides[state.previewIndex];
      els.previewStage.innerHTML = "";
      els.previewDots.innerHTML = "";

      if (!slide) {
        els.previewStage.innerHTML = `<div class="preview-fallback">No included slides yet.</div>`;
        return;
      }

      const previewShell = document.createElement("div");
      previewShell.className = "preview-carousel-shell";
      previewShell.innerHTML = `
        <section class="bk-carousel-block">
          <div class="bk-carousel carousel slide" data-bs-ride="false" aria-label="Preview carousel">
            <div class="carousel-inner">
              ${buildSlideMarkup(slide, true, true)}
            </div>
            <button class="carousel-control-prev" type="button" aria-label="Previous preview slide">
              <span class="carousel-control-prev-icon" aria-hidden="true"></span>
            </button>
            <button class="carousel-control-next" type="button" aria-label="Next preview slide">
              <span class="carousel-control-next-icon" aria-hidden="true"></span>
            </button>
          </div>
        </section>
      `;
      els.previewStage.appendChild(previewShell);

      const previewImage = els.previewStage.querySelector(".bk-carousel__media img");
      const previewSource = els.previewStage.querySelector(".bk-carousel__media source");
      if (previewSource) previewSource.srcset = previewImageUrl(mobileOrFallback(slide));
      if (previewImage) {
        previewImage.src = previewImageUrl(desktopOrFallback(slide));
        previewImage.onerror = () => {
          previewImage.style.display = "none";
          if (!els.previewStage.querySelector(".preview-fallback")) {
            const fallback = document.createElement("div");
            fallback.className = "preview-fallback";
            fallback.textContent = desktopOrFallback(slide) ? `Preview image was not found at ${previewImageUrl(desktopOrFallback(slide))}` : "Add a desktop image path to preview this slide.";
            els.previewStage.prepend(fallback);
          }
        };
      }

      slides.forEach((_, index) => {
        const dot = document.createElement("span");
        dot.className = `dot${index === state.previewIndex ? " active" : ""}`;
        els.previewDots.appendChild(dot);
      });
    }

    function generateCode() {
      const id = (els.carouselId.value || "bkHomeHeroOverlayCarousel").trim();
      const included = state.slides.filter(slide => slide.enabled);
      const includeComments = els.commentDisabled.value === "comments";
      const disabled = state.slides.filter(slide => !slide.enabled);
      const target = `#${id}`;

      const indicatorLines = included.map((_, index) => {
        const active = index === 0 ? ` class="active" aria-current="true"` : "";
        return `<button type="button" data-bs-target="${target}" data-bs-slide-to="${index}"${active} aria-label="Slide ${index + 1}"></button>`;
      });

      if (includeComments) {
        disabled.forEach((_, index) => {
          const slideNumber = included.length + index + 1;
          indicatorLines.push(`<!-- <button type="button" data-bs-target="${target}" data-bs-slide-to="${slideNumber - 1}" aria-label="Slide ${slideNumber}"></button> -->`);
        });
      }

      const slideLines = included.map((slide, index) => `<!-- Slide ${index + 1} -->\n${buildSlideMarkup(slide, index === 0, index === 0)}`);
      if (includeComments) {
        disabled.forEach(slide => {
          slideLines.push(`<!--\n${indentLines(buildSlideMarkup(slide, false, false), 0)}\n-->`);
        });
      }

      return `<!--
  CSU Bookstore homepage carousel
  CSS dependency: upload/link bk-carousel.css before this HTML block.
  JS dependency: Bootstrap 5 carousel JS, already supplied by MBS Insite.

  Image guidance:
  - Desktop image: wide hero crop, example 2400 x 900 px.
  - Mobile image: separate mobile crop, example 1100 x 900 px or another approved mobile composition.
  - Every slide should include both the mobile <source> and the desktop/default <img>.

  Content guidance:
  - Eyebrow is optional. Remove the <p class="bk-carousel__eyebrow">...</p> line when it does not add useful context.
  - Use one <h1> on the homepage. For additional slides, change h1 to h2 if heading structure becomes a concern.
  - Keep button text short and action-focused.
-->
<section class="bk-carousel-block">
<div id="${escapeAttr(id)}" class="bk-carousel bk-carousel--full carousel slide" data-bs-ride="false" aria-label="Featured Bookstore campaigns">
<div class="carousel-indicators">
${indicatorLines.join("\n")}
</div>
<div class="carousel-inner">
${slideLines.join("\n")}
</div>
<button class="carousel-control-prev" type="button" data-bs-target="${target}" data-bs-slide="prev">
<span class="carousel-control-prev-icon" aria-hidden="true"></span>
<span class="visually-hidden">Previous campaign</span>
</button>
<button class="carousel-control-next" type="button" data-bs-target="${target}" data-bs-slide="next">
<span class="carousel-control-next-icon" aria-hidden="true"></span>
<span class="visually-hidden">Next campaign</span>
</button>
</div>
</section>`;
    }

    function buildSlideMarkup(slide, active, isFirst) {
      const activeClass = active ? " active" : "";
      const headingTag = isFirst ? "h1" : "h2";
      const actions = buildCodeActions(slide);
      return `<div class="carousel-item${activeClass}">
<div class="bk-carousel__media" aria-hidden="true">
<picture>
<source media="(max-width: 767px)" srcset="${escapeAttr(mobileOrFallback(slide))}">
<img src="${escapeAttr(desktopOrFallback(slide))}" alt="${escapeAttr(slide.alt)}">
</picture>
</div>
<div class="container bk-carousel__content">
<div class="bk-carousel__panel">
${slide.eyebrow ? `<p class="bk-carousel__eyebrow">${escapeHtml(slide.eyebrow)}</p>\n` : ""}<${headingTag} class="bk-carousel__title">${headlineForCode(slide)}</${headingTag}>
${slide.description ? `<p class="bk-carousel__text">${escapeHtml(slide.description)}</p>\n` : ""}${actions}
</div>
</div>
</div>`;
    }

    function headlineForCode(slide) {
      const headline = cleanText(slide.headline);
      const highlight = cleanText(slide.highlight);
      if (!headline) return "";
      if (!highlight) return escapeHtml(headline);

      const index = headline.toLowerCase().indexOf(highlight.toLowerCase());
      if (index === -1) return escapeHtml(headline);

      const before = headline.slice(0, index);
      const match = headline.slice(index, index + highlight.length);
      const after = headline.slice(index + highlight.length);
      return `${escapeHtml(before)}<span class="bk-carousel__highlight">${escapeHtml(match)}</span>${escapeHtml(after)}`;
    }

    function buildCodeActions(slide) {
      const buttons = [];
      if (slide.primaryText && slide.primaryLink) buttons.push(codeButtonMarkup(slide.primaryText, slide.primaryLink, slide.primaryStyle));
      if (slide.secondaryText && slide.secondaryLink) buttons.push(codeButtonMarkup(slide.secondaryText, slide.secondaryLink, slide.secondaryStyle));
      if (!buttons.length) return "";
      return `<div class="bk-carousel__actions">\n${buttons.join("\n")}\n</div>\n`;
    }

    function codeButtonMarkup(text, link, style) {
      return `<a class="bk-carousel__btn bk-carousel__btn--${escapeAttr(style)}" href="${escapeAttr(link)}">${escapeHtml(text)} <span class="bk-carousel__arrow" aria-hidden="true"></span></a>`;
    }

    function indentLines(value, count) {
      const pad = " ".repeat(count);
      return String(value || "").split("\n").map(line => `${pad}${line}`).join("\n");
    }

    function setStatus(message) {
      els.status.textContent = message;
      window.clearTimeout(setStatus.timer);
      setStatus.timer = window.setTimeout(() => {
        els.status.textContent = "";
      }, 2500);
    }

    async function copyCode() {
      els.outputCode.value = generateCode();
      try {
        await navigator.clipboard.writeText(els.outputCode.value);
        setStatus("Copied.");
      } catch (error) {
        els.outputCode.focus();
        els.outputCode.select();
        setStatus("Code selected.");
      }
    }

    function goPreview(delta) {
      const slides = getEnabledSlides();
      if (!slides.length) return;
      state.previewIndex = (state.previewIndex + delta + slides.length) % slides.length;
      renderPreview();
    }

    document.querySelector("#loadSample").addEventListener("click", () => {
      els.sourceCode.value = sampleCode;
      parseSlidesFromCode(sampleCode);
    });
    document.querySelector("#importBtn").addEventListener("click", () => parseSlidesFromCode(els.sourceCode.value));
    document.querySelector("#addTop").addEventListener("click", () => {
      state.slides.push(makeSlide());
      render();
    });
    document.querySelector("#copyTop").addEventListener("click", copyCode);
    document.querySelector("#copyCode").addEventListener("click", copyCode);
    document.querySelector("#selectCode").addEventListener("click", () => {
      els.outputCode.focus();
      els.outputCode.select();
      setStatus("Code selected.");
    });
    document.querySelector("#prevSlide").addEventListener("click", () => goPreview(-1));
    document.querySelector("#nextSlide").addEventListener("click", () => goPreview(1));
    document.querySelector("#previewPrev").addEventListener("click", () => goPreview(-1));
    document.querySelector("#previewNext").addEventListener("click", () => goPreview(1));
    [els.carouselId, els.commentDisabled].forEach(input => input.addEventListener("input", render));

    els.sourceCode.value = sampleCode;
    parseSlidesFromCode(sampleCode);
  </script>
</body>
</html>
