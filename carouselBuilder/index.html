<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>CSU Bookstore Carousel Builder</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
  <link rel="stylesheet" href="../shared-theme.css?v=20260621-1">
</head>
<body>
  <div class="app-shell">
    <header class="suite-hero">
      <div class="suite-hero-image" role="img" aria-label="Colorado State University Lory Student Center"></div>
      <div class="suite-hero-inner">
        <div>
          <a class="suite-back" href="../index.html">&larr; Return to Toolbox</a>
          <p class="suite-eyebrow">Site content helper</p>
          <h1>Carousel Builder</h1>
          <p class="suite-lead">Paste an existing banner carousel, edit the slides in plain fields, preview the result, and copy fresh Bootstrap carousel code.</p>
        </div>
        <img class="suite-logo" src="../productListingHTMLBuilder/images/bookstoreLogo.png" alt="CSU Bookstore logo">
      </div>
    </header>

    <main class="layout">
      <div class="top-actions suite-workspace-actions">
        <button class="btn primary" id="copyTop" type="button" title="Copy generated carousel code">Copy Code</button>
        <button class="btn" id="addTop" type="button" title="Add a new carousel slide">Add Slide</button>
      </div>
      <section class="panel">
        <div class="panel-heading">
          <h2>Slides</h2>
          <div class="row-actions">
            <button class="btn small" id="loadSample" type="button">Load Current Carousel</button>
            <button class="btn small dark" id="importBtn" type="button">Import Pasted Code</button>
          </div>
        </div>
        <div class="panel-body import-tools">
          <label for="sourceCode">Paste carousel code here <span>Existing `.carousel-item` markup will be converted into editable slides.</span></label>
          <textarea id="sourceCode" spellcheck="false"></textarea>
          <div class="settings-grid">
            <label for="carouselId">Carousel ID
              <input id="carouselId" value="carouselExampleCaptions">
            </label>
            <label for="defaultInterval">Default interval
              <input id="defaultInterval" type="number" min="1000" step="500" value="8000">
            </label>
            <label for="commentDisabled">Disabled slides
              <select id="commentDisabled">
                <option value="comments">Keep as comments</option>
                <option value="omit">Leave out</option>
              </select>
            </label>
          </div>
          <div id="slideList" class="slide-list"></div>
        </div>
      </section>

      <section class="panel">
        <div class="panel-heading">
          <h2>Preview and Code</h2>
          <div class="row-actions">
            <button class="btn small" id="prevSlide" type="button" title="Previous preview slide">Prev</button>
            <button class="btn small" id="nextSlide" type="button" title="Next preview slide">Next</button>
          </div>
        </div>
        <div class="panel-body output-grid">
          <div class="preview-wrap" aria-live="polite">
            <div class="preview-stage" id="previewStage"></div>
            <div class="preview-nav">
              <button class="btn icon" id="previewPrev" type="button" title="Previous preview slide">&#8592;</button>
              <div class="dots" id="previewDots"></div>
              <button class="btn icon" id="previewNext" type="button" title="Next preview slide">&#8594;</button>
            </div>
          </div>
          <div class="row-actions">
            <button class="btn primary" id="copyCode" type="button">Copy Generated Code</button>
            <button class="btn" id="selectCode" type="button">Select Code</button>
            <span class="status" id="status"></span>
          </div>
          <label for="outputCode">Generated carousel code <span>Copy this into your site where the carousel HTML goes.</span></label>
          <textarea id="outputCode" spellcheck="false"></textarea>
        </div>
      </section>
    </main>
  </div>

  <script>
    const sampleCode = `<div id="carouselExampleCaptions" class="carousel slide" data-bs-ride="carousel">
<div class="carousel-indicators">
<button type="button" data-bs-target="#carouselExampleCaptions" data-bs-slide-to="0" class="active" aria-current="true" aria-label="Slide 1"></button>
<button type="button" data-bs-target="#carouselExampleCaptions" data-bs-slide-to="1" aria-label="Slide 2"></button>
<button type="button" data-bs-target="#carouselExampleCaptions" data-bs-slide-to="2" aria-label="Slide 3"></button>
<button type="button" data-bs-target="#carouselExampleCaptions" data-bs-slide-to="3" aria-label="Slide 4"></button>
<!--button type="button" data-bs-target="#carouselExampleCaptions" data-bs-slide-to="4" aria-label="Slide 5"></button-->
</div>
<div class="carousel-inner">
<!--FIRST SLIDE-->
<div class="carousel-item active" data-bs-interval="8000">
<img src="/SiteImages/109-SchoolImages/109-diploma-frame-1920x750.jpg" class="carousel-img d-block" style="border: 1px solid black" alt="A smiling graduate poses next to a picture of a CSU Diploma Frame.">
<div class="carousel-caption d-md-block">
<h5>You Earned It! Now Frame It!</h5>
<p>Protect and display your diploma with a high quality frame!</p>
<a href="/diploma-frames" class="btn btn-primary">Learn More</a></div>
</div>
<!--SECOND SLIDE-->
<div class="carousel-item" data-bs-interval="8000">
<img src="/SiteImages/109-SchoolImages/109-S25-yard-signs-1920x750.jpg" class="carousel-img d-block" alt="CSU graduation-themed yard signs on a front lawn, including a ‘Congratulations Graduate’ sign, a Ram logo sign, and a ‘Home of a Future Ram’ sign.">
<div class="carousel-caption d-md-block">
<h5>Make a STALWART Statement on Your Yard!</h5>
<p>Order your custom yard sign for springtime celebrations!</p>
<a href="/shop/merch/yard-signs" class="btn btn-primary">Order Today</a>
</div>
</div>
<div class="carousel-item" data-bs-interval="8000">
<img src="/SiteImages/109-SchoolImages/109-celebration-cam-1920x750.jpg" class="carousel-img d-block" alt="Various CSU Rams Clothing Items, including beanies and sweatshirts - appear on a light blue background. Text reads SPRING SALE with ornamental flowers in the background.">
<div class="carousel-caption d-md-block">
<h5><span style="color: rgb(200, 195, 114);"><em class="fa-kit fa-csuramhead"></em></span> Celebrate with CSU Spirit <span style="color: rgb(200, 195, 114);"><em class="fa-kit fa-csuramhead fa-flip-horizontal"></em></span></h5>
<p>Balloons, decorations, and party supplies for campus celebrations</p>
<a href="/shop/gifts/party" class="btn btn-primary">Shop Party Supplies</a>
</div>
</div>
<!--FOURTH SLIDE-->
<div class="carousel-item" data-bs-interval="8000">
<img src="/SiteImages/109-SchoolImages/109-macbook-neo-frontpage.jpg" class="carousel-img d-block" style="border: 1px solid black" alt="MacBook Neo laptops in silver, blush, citrus, and indigo colors displayed partially open in a fan arrangement.">
<div class="carousel-caption d-md-block">
<h5>MacBook Neo</h5>
<p>Love at first Mac. Starting at $499 with RAMTech Education Discounts</p>
<a href="/shop/electronics/apple/Apple-MacBook-Neo-13-inch-A18-Pro" class="btn btn-primary">Order Today!</a></div>
</div>
</div>
<button class="carousel-control-prev" type="button" data-bs-target="#carouselExampleCaptions" data-bs-slide="prev">
<em class="fa-solid fa-chevron-left fa-2xl" aria-hidden="true"></em>
<span class="visually-hidden">Previous</span>
</button>
<button class="carousel-control-next" type="button" data-bs-target="#carouselExampleCaptions" data-bs-slide="next">
<em class="fa-solid fa-chevron-right fa-2xl" aria-hidden="true"></em>
<span class="visually-hidden">Next</span>
</button>
</div>`;

    const previewImageHost = "https://bookstore.colostate.edu";

    const state = {
      slides: [],
      previewIndex: 0
    };

    const els = {
      sourceCode: document.querySelector("#sourceCode"),
      slideList: document.querySelector("#slideList"),
      carouselId: document.querySelector("#carouselId"),
      defaultInterval: document.querySelector("#defaultInterval"),
      commentDisabled: document.querySelector("#commentDisabled"),
      previewStage: document.querySelector("#previewStage"),
      previewDots: document.querySelector("#previewDots"),
      outputCode: document.querySelector("#outputCode"),
      status: document.querySelector("#status")
    };

    function cleanText(value) {
      return String(value || "").replace(/\s+/g, " ").trim();
    }

    function escapeAttr(value) {
      return String(value || "")
        .replace(/&/g, "&amp;")
        .replace(/"/g, "&quot;")
        .replace(/</g, "&lt;")
        .replace(/>/g, "&gt;");
    }

    function makeSlide(overrides = {}) {
      return {
        enabled: true,
        image: "",
        alt: "",
        titleHtml: "",
        description: "",
        link: "",
        button: "Shop Now",
        interval: els.defaultInterval.value || "8000",
        border: false,
        ...overrides
      };
    }

    function previewImageUrl(path) {
      const value = String(path || "").trim();
      if (!value) return "";
      if (/^(https?:)?\/\//i.test(value) || value.startsWith("data:")) return value;
      if (value.startsWith("/")) return `${previewImageHost}${value}`;
      return `${previewImageHost}/${value}`;
    }

    function parseSlidesFromCode(code) {
      const parser = new DOMParser();
      const doc = parser.parseFromString(`<div id="parse-root">${code}</div>`, "text/html");
      const carousel = doc.querySelector(".carousel");
      const foundId = carousel && carousel.id ? carousel.id : "";
      if (foundId) els.carouselId.value = foundId;

      const activeSlides = Array.from(doc.querySelectorAll(".carousel-item")).map(item => slideFromElement(item, true));
      const commentSlides = [];
      const commentMatches = String(code).match(/<!--[\s\S]*?-->/g) || [];
      commentMatches.forEach(comment => {
        if (!comment.includes("carousel-item")) return;
        const uncommented = comment.replace(/^<!--/, "").replace(/-->$/, "");
        const commentDoc = parser.parseFromString(`<div>${uncommented}</div>`, "text/html");
        const item = commentDoc.querySelector(".carousel-item");
        if (item) commentSlides.push(slideFromElement(item, false));
      });

      const slides = [...activeSlides, ...commentSlides];
      state.slides = slides.length ? slides : [makeSlide()];
      state.previewIndex = 0;
      render();
      setStatus(`Imported ${state.slides.length} slide${state.slides.length === 1 ? "" : "s"}.`);
    }

    function slideFromElement(item, enabled) {
      const img = item.querySelector("img");
      const title = item.querySelector("h5");
      const description = item.querySelector("p");
      const link = item.querySelector("a");
      return makeSlide({
        enabled,
        image: img ? img.getAttribute("src") || "" : "",
        alt: img ? img.getAttribute("alt") || "" : "",
        titleHtml: title ? title.innerHTML.trim() : "",
        description: description ? cleanText(description.textContent) : "",
        link: link ? link.getAttribute("href") || "" : "",
        button: link ? cleanText(link.textContent) : "",
        interval: item.getAttribute("data-bs-interval") || els.defaultInterval.value || "8000",
        border: img ? String(img.getAttribute("style") || "").includes("border") : false
      });
    }

    function render() {
      normalizePreviewIndex();
      renderSlideForms();
      refreshPreviewAndCode();
    }

    function refreshPreviewAndCode() {
      normalizePreviewIndex();
      renderPreview();
      els.outputCode.value = generateCode();
    }

    function normalizePreviewIndex() {
      const enabled = getEnabledSlides();
      if (!enabled.length) {
        state.previewIndex = 0;
        return;
      }
      state.previewIndex = Math.min(Math.max(state.previewIndex, 0), enabled.length - 1);
    }

    function getEnabledSlides() {
      return state.slides.filter(slide => slide.enabled);
    }

    function renderSlideForms() {
      els.slideList.innerHTML = "";
      state.slides.forEach((slide, index) => {
        const card = document.createElement("article");
        card.className = "slide-card";
        card.innerHTML = `
          <div class="slide-summary">
            <img class="slide-thumb" src="${escapeAttr(previewImageUrl(slide.image))}" alt="">
            <div>
              <div class="slide-title">Slide ${index + 1}: ${cleanText(stripTags(slide.titleHtml)) || "Untitled"}</div>
              <div class="slide-meta">${slide.enabled ? "Included" : "Disabled"} · ${slide.link || "No link yet"}</div>
            </div>
            <div class="slide-actions">
              <button class="btn icon" type="button" data-action="up" title="Move slide up">&#8593;</button>
              <button class="btn icon" type="button" data-action="down" title="Move slide down">&#8595;</button>
              <button class="btn icon" type="button" data-action="duplicate" title="Duplicate slide">+</button>
              <button class="btn icon danger" type="button" data-action="remove" title="Remove slide">&times;</button>
            </div>
          </div>
          <div class="slide-fields">
            <label class="wide">Image path
              <input data-field="image" value="${escapeAttr(slide.image)}" placeholder="/SiteImages/109-SchoolImages/example-1920x750.jpg">
            </label>
            <label class="wide">Alt text
              <input data-field="alt" value="${escapeAttr(slide.alt)}" placeholder="Describe the image for accessibility">
            </label>
            <label class="wide">Headline HTML
              <input data-field="titleHtml" value="${escapeAttr(slide.titleHtml)}" placeholder="Carousel headline">
            </label>
            <label class="wide">Body copy
              <input data-field="description" value="${escapeAttr(slide.description)}" placeholder="Short supporting message">
            </label>
            <label>Button link
              <input data-field="link" value="${escapeAttr(slide.link)}" placeholder="/shop/example">
            </label>
            <label>Button text
              <input data-field="button" value="${escapeAttr(slide.button)}" placeholder="Shop Now">
            </label>
            <div class="inline-fields wide">
              <label>Interval
                <input data-field="interval" type="number" min="1000" step="500" value="${escapeAttr(slide.interval)}">
              </label>
              <label class="check-row">
                <input data-field="enabled" type="checkbox" ${slide.enabled ? "checked" : ""}>
                Include slide
              </label>
              <label class="check-row">
                <input data-field="border" type="checkbox" ${slide.border ? "checked" : ""}>
                Add black border
              </label>
            </div>
          </div>
        `;

        card.querySelectorAll("[data-field]").forEach(field => {
          field.addEventListener("input", () => {
            const key = field.dataset.field;
            slide[key] = field.type === "checkbox" ? field.checked : field.value;
            if (key === "image") {
              const thumb = card.querySelector(".slide-thumb");
              thumb.src = previewImageUrl(field.value);
            }
            refreshPreviewAndCode();
          });
        });

        card.querySelectorAll("[data-action]").forEach(button => {
          button.addEventListener("click", () => runSlideAction(button.dataset.action, index));
        });

        els.slideList.appendChild(card);
      });
    }

    function stripTags(html) {
      const div = document.createElement("div");
      div.innerHTML = html || "";
      return div.textContent || div.innerText || "";
    }

    function runSlideAction(action, index) {
      if (action === "up" && index > 0) {
        [state.slides[index - 1], state.slides[index]] = [state.slides[index], state.slides[index - 1]];
      }
      if (action === "down" && index < state.slides.length - 1) {
        [state.slides[index + 1], state.slides[index]] = [state.slides[index], state.slides[index + 1]];
      }
      if (action === "duplicate") {
        state.slides.splice(index + 1, 0, makeSlide({ ...state.slides[index] }));
      }
      if (action === "remove") {
        state.slides.splice(index, 1);
        if (!state.slides.length) state.slides.push(makeSlide());
      }
      render();
    }

    function renderPreview() {
      const slides = getEnabledSlides();
      const slide = slides[state.previewIndex];
      els.previewStage.innerHTML = "";
      els.previewDots.innerHTML = "";

      if (!slide) {
        els.previewStage.innerHTML = `<div class="preview-fallback">No included slides yet.</div>`;
        return;
      }

      const img = document.createElement("img");
      img.src = previewImageUrl(slide.image);
      img.alt = slide.alt;
      img.onerror = () => {
        img.style.display = "none";
        if (!els.previewStage.querySelector(".preview-fallback")) {
          const fallback = document.createElement("div");
          fallback.className = "preview-fallback";
          fallback.textContent = slide.image ? `Preview image was not found at ${previewImageUrl(slide.image)}` : "Add an image path to preview this slide.";
          els.previewStage.prepend(fallback);
        }
      };
      els.previewStage.appendChild(img);

      const caption = document.createElement("div");
      caption.className = "caption";
      caption.innerHTML = `
        <h3>${slide.titleHtml || "Carousel headline"}</h3>
        <p>${escapeHtml(slide.description || "Short supporting message")}</p>
        ${slide.link && slide.button ? `<a href="${escapeAttr(slide.link)}">${escapeHtml(slide.button)}</a>` : ""}
      `;
      els.previewStage.appendChild(caption);

      slides.forEach((_, index) => {
        const dot = document.createElement("span");
        dot.className = `dot${index === state.previewIndex ? " active" : ""}`;
        els.previewDots.appendChild(dot);
      });
    }

    function escapeHtml(value) {
      return String(value || "")
        .replace(/&/g, "&amp;")
        .replace(/</g, "&lt;")
        .replace(/>/g, "&gt;");
    }

    function generateCode() {
      const id = (els.carouselId.value || "carouselExampleCaptions").trim();
      const included = state.slides.filter(slide => slide.enabled);
      const includeComments = els.commentDisabled.value === "comments";
      const disabled = state.slides.filter(slide => !slide.enabled);
      const target = `#${id}`;

      const indicatorLines = included.map((_, index) => {
        const active = index === 0 ? ` class="active" aria-current="true"` : "";
        return `<button type="button" data-bs-target="${target}" data-bs-slide-to="${index}"${active} aria-label="Slide ${index + 1}"></button>`;
      });

      if (includeComments) {
        disabled.forEach((_, index) => {
          const slideNumber = included.length + index + 1;
          indicatorLines.push(`<!--button type="button" data-bs-target="${target}" data-bs-slide-to="${slideNumber - 1}" aria-label="Slide ${slideNumber}"></button-->`);
        });
      }

      const slideLines = included.map((slide, index) => buildSlideMarkup(slide, index === 0));
      if (includeComments) {
        disabled.forEach(slide => {
          slideLines.push(`<!-- ${buildSlideMarkup(slide, false).replace(/-->/g, "--&gt;")} -->`);
        });
      }

      return `<div id="${escapeAttr(id)}" class="carousel slide" data-bs-ride="carousel">
<div class="carousel-indicators">
${indicatorLines.join("\n")}
</div>
<div class="carousel-inner">
${slideLines.join("\n")}
</div>
<button class="carousel-control-prev" type="button" data-bs-target="${target}" data-bs-slide="prev">
<em class="fa-solid fa-chevron-left fa-2xl" aria-hidden="true"></em>
<span class="visually-hidden">Previous</span>
</button>
<button class="carousel-control-next" type="button" data-bs-target="${target}" data-bs-slide="next">
<em class="fa-solid fa-chevron-right fa-2xl" aria-hidden="true"></em>
<span class="visually-hidden">Next</span>
</button>
</div>`;
    }

    function buildSlideMarkup(slide, active) {
      const activeClass = active ? " active" : "";
      const interval = slide.interval || els.defaultInterval.value || "8000";
      const borderStyle = slide.border ? ` style="border: 1px solid black"` : "";
      const link = slide.link && slide.button
        ? `<a href="${escapeAttr(slide.link)}" class="btn btn-primary">${escapeHtml(slide.button)}</a>`
        : "";
      return `<div class="carousel-item${activeClass}" data-bs-interval="${escapeAttr(interval)}">
<img src="${escapeAttr(slide.image)}" class="carousel-img d-block"${borderStyle} alt="${escapeAttr(slide.alt)}">
<div class="carousel-caption d-md-block">
<h5>${slide.titleHtml || ""}</h5>
<p>${escapeHtml(slide.description || "")}</p>
${link}
</div>
</div>`;
    }

    function setStatus(message) {
      els.status.textContent = message;
      window.clearTimeout(setStatus.timer);
      setStatus.timer = window.setTimeout(() => {
        els.status.textContent = "";
      }, 2500);
    }

    async function copyCode() {
      els.outputCode.value = generateCode();
      try {
        await navigator.clipboard.writeText(els.outputCode.value);
        setStatus("Copied.");
      } catch (error) {
        els.outputCode.focus();
        els.outputCode.select();
        setStatus("Code selected.");
      }
    }

    function goPreview(delta) {
      const slides = getEnabledSlides();
      if (!slides.length) return;
      state.previewIndex = (state.previewIndex + delta + slides.length) % slides.length;
      renderPreview();
    }

    document.querySelector("#loadSample").addEventListener("click", () => {
      els.sourceCode.value = sampleCode;
      parseSlidesFromCode(sampleCode);
    });
    document.querySelector("#importBtn").addEventListener("click", () => parseSlidesFromCode(els.sourceCode.value));
    document.querySelector("#addTop").addEventListener("click", () => {
      state.slides.push(makeSlide());
      render();
    });
    document.querySelector("#copyTop").addEventListener("click", copyCode);
    document.querySelector("#copyCode").addEventListener("click", copyCode);
    document.querySelector("#selectCode").addEventListener("click", () => {
      els.outputCode.focus();
      els.outputCode.select();
      setStatus("Code selected.");
    });
    document.querySelector("#prevSlide").addEventListener("click", () => goPreview(-1));
    document.querySelector("#nextSlide").addEventListener("click", () => goPreview(1));
    document.querySelector("#previewPrev").addEventListener("click", () => goPreview(-1));
    document.querySelector("#previewNext").addEventListener("click", () => goPreview(1));
    [els.carouselId, els.defaultInterval, els.commentDisabled].forEach(input => input.addEventListener("input", render));

    els.sourceCode.value = sampleCode;
    parseSlidesFromCode(sampleCode);
  </script>
</body>
</html>
